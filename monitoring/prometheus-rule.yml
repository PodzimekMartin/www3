apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: course-reservations-alerts
spec:
  groups:
    - name: course-reservations
      rules:
        - alert: CourseReservationsHighErrorRate
          expr: sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m])) > 0.05
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: High 5xx error rate in course-reservations
        - alert: CourseReservationsPodRestarts
          expr: increase(kube_pod_container_status_restarts_total{container="app"}[10m]) > 2
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: Course Reservations pod is restarting repeatedly
