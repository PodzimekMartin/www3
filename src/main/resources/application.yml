spring:
  application:
    name: course-reservations
  datasource:
    url: jdbc:h2:mem:courses;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true

app:
  seed-data: true
  security:
    jwt-secret: ${APP_JWT_SECRET:local-development-secret-change-me}
    jwt-expiration-seconds: 7200
