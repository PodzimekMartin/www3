<!doctype html>
<html lang="cs">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Course Reservations</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<header class="topbar">
    <div>
        <p class="eyebrow">Semestralni aplikace</p>
        <h1>Sprava kurzu</h1>
    </div>
    <div class="topbar-actions">
        <span id="userBadge" class="user-badge"></span>
        <button id="logoutButton" class="secondary hidden" type="button">Odhlasit</button>
        <button id="refreshButton" class="icon-button" title="Obnovit data" aria-label="Obnovit data">↻</button>
    </div>
</header>

<main>
    <section id="loginPanel" class="panel login-panel">
        <h2>Prihlaseni</h2>
        <form id="loginForm" class="stack">
            <label>Uzivatel nebo e-mail
                <input name="username" required placeholder="admin, teacher@example.test nebo ada@example.test">
            </label>
            <label>Heslo
                <input name="password" required type="password" placeholder="admin123 / teacher123 / student123">
            </label>
            <button type="submit">Prihlasit</button>
        </form>
        <div class="credentials">
            <span>Admin: <strong>admin</strong> / <strong>admin123</strong></span>
            <span>Vyucujici: <strong>teacher@example.test</strong> / <strong>teacher123</strong></span>
            <span>Student: <strong>ada@example.test</strong> / <strong>student123</strong></span>
        </div>
    </section>

    <div id="appContent" class="layout hidden">
    <section class="panel admin-only student-panel">
        <h2>Novy student</h2>
        <form id="studentForm" class="stack">
            <label>Jmeno <input name="name" required placeholder="Ada Lovelace"></label>
            <label>E-mail <input name="email" required type="email" placeholder="ada@example.test"></label>
            <button type="submit">Pridat studenta</button>
        </form>
    </section>

    <section class="panel admin-only instructor-panel">
        <h2>Novy vyucujici</h2>
        <form id="instructorForm" class="stack">
            <label>Jmeno <input name="name" required placeholder="Jan Novak"></label>
            <label>E-mail <input name="email" required type="email" placeholder="teacher@example.test"></label>
            <button type="submit">Pridat vyucujiciho</button>
        </form>
    </section>

    <section class="panel course-manager-only course-form-panel">
        <h2>Novy kurz</h2>
        <form id="courseForm" class="stack">
            <label>Nazev <input name="title" required placeholder="DevOps pipeline prakticky"></label>
            <label id="courseInstructorField">Vyucujici
                <select id="courseInstructorSelect" name="instructorId" required></select>
            </label>
            <label>Kapacita <input name="capacity" required type="number" min="1" value="2"></label>
            <div>
                <div class="section-head">
                    <h3>Terminy kurzu</h3>
                    <button id="addCourseSessionButton" class="secondary" type="button">Pridat termin</button>
                </div>
                <div id="courseSessionRows" class="session-editor"></div>
            </div>
            <button type="submit">Vytvorit kurz</button>
        </form>
    </section>

    <section class="panel course-list-panel">
        <div class="section-head">
            <h2>Kurzy</h2>
            <p id="summary" class="muted"></p>
        </div>
        <div id="courses" class="courses"></div>
    </section>

    <section class="panel admin-only students-panel">
        <h2>Studenti</h2>
        <div id="students" class="students"></div>
    </section>

    <section class="panel admin-only instructors-panel">
        <h2>Vyucujici</h2>
        <div id="instructors" class="students"></div>
    </section>
    </div>
</main>

<div id="toast" class="toast" role="status"></div>
<script src="/app.js"></script>
</body>
</html>
