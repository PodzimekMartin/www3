<!doctype html>
<html lang="cs">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Course Reservations</title>
    <link rel="stylesheet" href="/styles.css?v=20260513-publish-flow">
</head>
<body>
<header class="topbar">
    <div>
        <p class="eyebrow">Semestralni aplikace</p>
        <h1>Sprava kurzu</h1>
    </div>
    <div class="topbar-actions">
        <span id="userBadge" class="user-badge"></span>
        <button id="logoutButton" class="secondary hidden" type="button">Odhlasit se</button>
        <button id="refreshButton" class="icon-button" title="Obnovit data" aria-label="Obnovit data">↻</button>
    </div>
</header>

<main>
    <section id="loginPanel" class="panel login-panel">
        <h2>Prihlaseni</h2>
        <form id="loginForm" class="stack">
            <label>Uzivatel nebo e-mail
                <input name="username" required placeholder="admin, teacher@example.test nebo ada@example.test">
            </label>
            <label>Heslo
                <input name="password" required type="password" placeholder="admin123 / teacher123 / student123">
            </label>
            <button type="submit">Prihlasit se</button>
        </form>
        <div class="credentials">
            <span>Admin: <strong>admin</strong> / <strong>admin123</strong></span>
            <span>Vyucujici: <strong>teacher@example.test</strong> / <strong>teacher123</strong></span>
            <span>Student: <strong>ada@example.test</strong> / <strong>student123</strong></span>
        </div>
    </section>

    <div id="appContent" class="layout hidden">
    <nav id="adminTabs" class="dashboard-tabs admin-only" aria-label="Admin dashboard">
        <button type="button" data-admin-tab="courses">Kurzy</button>
        <button type="button" data-admin-tab="students">Studenti</button>
        <button type="button" data-admin-tab="instructors">Vyucujici</button>
    </nav>

    <section class="overview-panel" aria-label="Prehled aplikace">
        <div id="stats" class="stats"></div>
    </section>

    <section class="panel admin-only student-panel" data-dashboard-panel="students">
        <h2>Novy student</h2>
        <form id="studentForm" class="stack">
            <label>Jmeno <input name="name" required placeholder="Ada Lovelace"></label>
            <label>E-mail <input name="email" required type="email" placeholder="ada@example.test"></label>
            <button type="submit">Vytvorit studenta</button>
        </form>
    </section>

    <section class="panel admin-only instructor-panel" data-dashboard-panel="instructors">
        <h2>Novy vyucujici</h2>
        <form id="instructorForm" class="stack">
            <label>Jmeno <input name="name" required placeholder="Jan Novak"></label>
            <label>E-mail <input name="email" required type="email" placeholder="teacher@example.test"></label>
            <button type="submit">Vytvorit vyucujiciho</button>
        </form>
    </section>

    <section class="panel course-manager-only course-form-panel" data-dashboard-panel="courses">
        <h2>Novy kurz</h2>
        <form id="courseForm" class="stack">
            <label>Nazev <input name="title" required placeholder="DevOps pipeline prakticky"></label>
            <label id="courseInstructorField">Vyucujici
                <select id="courseInstructorSelect" name="instructorId" required></select>
            </label>
            <label>Kapacita <input name="capacity" required type="number" min="1" value="2"></label>
            <div>
                <div class="section-head">
                    <h3>Terminy kurzu</h3>
                    <button id="addCourseSessionButton" class="secondary" type="button">Pridat termin</button>
                </div>
                <div id="courseSessionRows" class="session-editor"></div>
            </div>
            <div class="form-actions">
                <button class="secondary" type="submit" name="publishMode" value="draft">Vytvorit koncept</button>
                <button type="submit" name="publishMode" value="publish">Vytvorit a publikovat</button>
            </div>
        </form>
    </section>

    <section class="panel course-list-panel" data-dashboard-panel="courses">
        <div class="section-head">
            <h2>Kurzy</h2>
            <p id="courseResultCount" class="muted"></p>
        </div>
        <div class="filters">
            <label>Vyhledat
                <input id="courseSearch" type="search" placeholder="Nazev kurzu nebo vyucujici">
            </label>
            <label>Stav
                <select id="courseStatusFilter">
                    <option value="ALL">Vsechny kurzy</option>
                    <option value="PUBLISHED">Publikovane</option>
                    <option value="DRAFT">Koncepty</option>
                </select>
            </label>
            <label>Obsazeni
                <select id="courseCapacityFilter">
                    <option value="ALL">Vsechny kapacity</option>
                    <option value="OPEN">S volnym mistem</option>
                    <option value="FULL">Plne kurzy</option>
                </select>
            </label>
        </div>
        <div id="courses" class="courses"></div>
    </section>

    <section class="panel admin-only students-panel" data-dashboard-panel="students">
        <div class="section-head">
            <h2>Studenti</h2>
            <p id="studentResultCount" class="muted"></p>
        </div>
        <div class="filters">
            <label>Vyhledat
                <input id="studentSearch" type="search" placeholder="Jmeno nebo e-mail">
            </label>
            <label>Stav
                <select id="studentStatusFilter">
                    <option value="ALL">Vsichni studenti</option>
                    <option value="ACTIVE">Aktivni</option>
                    <option value="BLOCKED">Blokovani</option>
                </select>
            </label>
        </div>
        <div id="students" class="students"></div>
    </section>

    <section class="panel admin-only instructors-panel" data-dashboard-panel="instructors">
        <div class="section-head">
            <h2>Vyucujici</h2>
            <p id="instructorResultCount" class="muted"></p>
        </div>
        <div class="filters">
            <label>Vyhledat
                <input id="instructorSearch" type="search" placeholder="Jmeno nebo e-mail">
            </label>
        </div>
        <div id="instructors" class="students"></div>
    </section>
    </div>
</main>

<div id="toast" class="toast" role="status"></div>
<div id="courseDetailModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="courseDetailTitle">
    <div class="modal-card">
        <div class="section-head">
            <div>
                <p class="eyebrow">Detail kurzu</p>
                <h2 id="courseDetailTitle">Kurz</h2>
            </div>
            <button class="secondary" type="button" data-close-modal>Zavrit</button>
        </div>
        <div id="courseDetailBody" class="detail-body"></div>
    </div>
</div>

<div id="confirmModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
    <div class="modal-card confirm-card">
        <h2 id="confirmTitle">Potvrdit akci</h2>
        <p id="confirmMessage" class="muted spacing"></p>
        <div class="modal-actions">
            <button class="secondary" type="button" data-cancel-confirm>Zpet</button>
            <button class="danger" type="button" data-confirm-delete>Potvrdit</button>
        </div>
    </div>
</div>
<script src="/app.js?v=20260513-publish-flow"></script>
</body>
</html>
