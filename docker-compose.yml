services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: courses
      POSTGRES_USER: courses
      POSTGRES_PASSWORD: courses-dev-password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U courses -d courses"]
      interval: 10s
      timeout: 5s
      retries: 6
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/courses
      SPRING_DATASOURCE_USERNAME: courses
      SPRING_DATASOURCE_PASSWORD: courses-dev-password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      APP_SEED_DATA: "true"
    ports:
      - "8080:8080"

volumes:
  postgres-data:
